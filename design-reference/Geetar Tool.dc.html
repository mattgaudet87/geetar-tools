<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;}
    @keyframes dotIn{from{transform:scale(.45);opacity:0;}to{transform:scale(1);opacity:1;}}
  </style>
</helmet>
<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% -10%,#161d27 0%,#0d1117 55%,#0a0d12 100%);font-family:'Sora',sans-serif;color:#e6e9ef;padding:40px 28px 64px;">
  <div style="max-width:1180px;margin:0 auto;">

    <!-- HEADER -->
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:30px;">
      <div style="width:34px;height:34px;border-radius:9px;background:radial-gradient(circle at 35% 30%,#7df0c0,#10b07f);box-shadow:0 0 18px rgba(52,211,153,0.35),inset 0 0 0 1px rgba(255,255,255,0.2);"></div>
      <div>
        <div style="font-weight:800;font-size:25px;letter-spacing:-0.02em;line-height:1;color:#f3f6fa;">Geetar Tool</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div style="background:linear-gradient(180deg,#161d28,#131923);border:1px solid #242d3b;border-radius:16px;padding:6px 22px 4px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset,0 14px 40px rgba(0,0,0,0.35);">

      <!-- toolbar -->
      <div style="display:flex;flex-wrap:wrap;gap:14px 22px;align-items:center;justify-content:flex-end;padding:14px 0;border-bottom:1px solid #1d2531;">
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Dots</span>
          <div style="display:inline-flex;gap:3px;background:#0f141d;border:1px solid #242d3b;border-radius:10px;padding:3px;">
            <button type="button" style="{{ degActive }}" onClick="{{ setDeg }}">Degrees</button>
            <button type="button" style="{{ noteActive }}" onClick="{{ setNote }}">Note names</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Sound</span>
          <button type="button" style="{{ soundStyle }}" onClick="{{ toggleSound }}"><span style="{{ soundDotStyle }}"></span>{{ soundLabel }}</button>
        </div>
        <div style="display:flex;align-items:center;gap:9px;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Neck</span>
          <select style="{{ selectStyle }}" value="{{ material }}" onChange="{{ onMaterial }}">
            <sc-for list="{{ materialList }}" as="m" hint-placeholder-count="3"><option value="{{ m }}">{{ m }}</option></sc-for>
          </select>
        </div>
      </div>

      <!-- root -->
      <div style="display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid #1d2531;flex-wrap:wrap;">
        <div style="width:52px;flex:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Root</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          <sc-for list="{{ rootList }}" as="r" hint-placeholder-count="12"><button type="button" style="{{ r.style }}" onClick="{{ r.onClick }}">{{ r.name }}</button></sc-for>
        </div>
      </div>

      <!-- scale -->
      <div style="display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid #1d2531;flex-wrap:wrap;">
        <div style="width:52px;flex:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Scale</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          <sc-for list="{{ scaleList }}" as="s" hint-placeholder-count="8"><button type="button" style="{{ s.style }}" onClick="{{ s.onClick }}">{{ s.name }}</button></sc-for>
        </div>
      </div>

      <!-- tuning -->
      <div style="display:flex;align-items:center;gap:16px;padding:13px 0;flex-wrap:wrap;">
        <div style="width:52px;flex:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#6b7485;text-transform:uppercase;">Tuning</div>
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:16px;">
          <select style="{{ selectStyle }}" value="{{ presetValue }}" onChange="{{ onPreset }}">
            <sc-for list="{{ presetList }}" as="p" hint-placeholder-count="9"><option value="{{ p }}">{{ p }}</option></sc-for>
          </select>
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:#4e5768;text-transform:uppercase;">High</span>
            <div style="display:flex;gap:6px;">
              <sc-for list="{{ tuningStrings }}" as="ts" hint-placeholder-count="6">
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <button type="button" style="{{ ts.upStyle }}" onClick="{{ ts.up }}">&#9650;</button>
                  <div style="{{ ts.boxStyle }}">{{ ts.note }}</div>
                  <button type="button" style="{{ ts.downStyle }}" onClick="{{ ts.down }}">&#9660;</button>
                </div>
              </sc-for>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:0.14em;color:#4e5768;text-transform:uppercase;">Low</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SCALE STRIP -->
    <div style="display:flex;align-items:flex-end;gap:16px;margin:26px 2px 18px;flex-wrap:wrap;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.18em;color:#6b7485;text-transform:uppercase;padding-bottom:10px;">Scale</div>
      <div style="display:flex;flex-wrap:wrap;align-items:flex-end;gap:6px;">
        <sc-for list="{{ chips }}" as="ch" hint-placeholder-count="7">
          <div style="display:flex;align-items:flex-end;gap:6px;">
            <div style="display:flex;flex-direction:column;align-items:center;">
              <div style="{{ ch.degStyle }}">{{ ch.degree }}</div>
              <div style="{{ ch.pillStyle }}">{{ ch.note }}</div>
            </div>
            <sc-if value="{{ ch.hasStep }}" hint-placeholder-val="{{ false }}">
              <div style="{{ stepStyle }}">{{ ch.step }}</div>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </div>

    <!-- BOARD PANEL -->
    <div style="background:linear-gradient(180deg,#10151e,#0c1118);border:1px solid #222a37;border-radius:18px;padding:22px 22px 18px;box-shadow:0 18px 50px rgba(0,0,0,0.45);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:11px;">
          <span style="width:9px;height:9px;border-radius:50%;background:#34d399;box-shadow:0 0 10px rgba(52,211,153,0.7);"></span>
          <span style="font-weight:700;font-size:19px;letter-spacing:-0.01em;color:#f3f6fa;">{{ current }}</span>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#5a6273;text-transform:uppercase;">{{ fretRange }}</div>
      </div>

      <!-- fret numbers -->
      <div style="display:flex;align-items:flex-end;margin-bottom:7px;">
        <div style="width:26px;flex:none;"></div>
        <div style="flex:1;display:flex;flex-direction:{{ flexDir }};">
          <sc-for list="{{ fretCells }}" as="fc" hint-placeholder-count="13">
            <div style="{{ fc.numStyle }}">{{ fc.num }}</div>
          </sc-for>
        </div>
      </div>

      <!-- board -->
      <div style="display:flex;">
        <div style="width:26px;flex:none;display:flex;flex-direction:column;">
          <sc-for list="{{ strings }}" as="s" hint-placeholder-count="6">
            <div style="height:54px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;color:#7b8492;">{{ s.name }}</div>
          </sc-for>
        </div>
        <div style="flex:1;position:relative;border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.55);box-shadow:inset 0 2px 12px rgba(0,0,0,0.55),0 10px 30px rgba(0,0,0,0.35);">
          <div style="{{ boardBg }}"></div>
          <div style="{{ grain }}"></div>
          <div style="{{ inlayOuter }}">
            <sc-for list="{{ fretCells }}" as="fc" hint-placeholder-count="13">
              <div style="flex:1 1 0;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:108px;">
                <sc-if value="{{ fc.marker }}" hint-placeholder-val="{{ false }}">
                  <div style="{{ inlayDot }}"></div>
                </sc-if>
                <sc-if value="{{ fc.dbl }}" hint-placeholder-val="{{ false }}">
                  <div style="{{ inlayDot }}"></div>
                  <div style="{{ inlayDot }}"></div>
                </sc-if>
              </div>
            </sc-for>
          </div>
          <div style="position:relative;z-index:2;">
            <sc-for list="{{ strings }}" as="s" hint-placeholder-count="6">
              <div style="{{ s.rowStyle }}">
                <div style="{{ s.lineStyle }}"></div>
                <sc-for list="{{ s.cells }}" as="c" hint-placeholder-count="13">
                  <div style="{{ c.cellStyle }}">
                    <sc-if value="{{ c.present }}" hint-placeholder-val="{{ false }}">
                      <div style="{{ c.dotStyle }}" style-hover="transform:translateY(-1px) scale(1.1)" onClick="{{ c.onClick }}">{{ c.label }}</div>
                    </sc-if>
                  </div>
                </sc-for>
              </div>
            </sc-for>
          </div>
        </div>
      </div>

      <!-- legend -->
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-top:18px;padding-top:16px;border-top:1px solid #1a212c;">
        <div style="display:flex;gap:22px;align-items:center;">
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7df0c0,#11b07f);box-shadow:0 0 8px rgba(52,211,153,0.4);"></span>
            <span style="font-size:12.5px;color:#a7afbd;">Root note</span>
          </div>
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#2b3545,#19212e);border:1px solid #3b4759;"></span>
            <span style="font-size:12.5px;color:#a7afbd;">Scale note</span>
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#566072;letter-spacing:0.04em;">Click a note to hear it</div>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#566072;letter-spacing:0.02em;">{{ legendNote }}</div>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;material&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Walnut&quot;,&quot;options&quot;:[&quot;Walnut&quot;,&quot;Graphite&quot;,&quot;Maple&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Fretboard&quot;},&quot;lefty&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Fretboard&quot;},&quot;fretCount&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:12,&quot;min&quot;:12,&quot;max&quot;:24,&quot;step&quot;:1,&quot;unit&quot;:&quot;frets&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Fretboard&quot;}}">
class Component extends DCLogic {
  state = { root: 9, scale: 'Major', mode: 'deg', sound: true, material: null, tuning: [64,59,55,50,45,40] };

  // Open pitches in DISPLAY order: high e -> low E (midi)
  PRESETS = {
    'Standard':         [64,59,55,50,45,40],
    'Drop D':           [64,59,55,50,45,38],
    'Drop C':           [62,57,53,48,43,36],
    'Half Step Down':   [63,58,54,49,44,39],
    'Whole Step Down':  [62,57,53,48,43,38],
    'Open G':           [62,59,55,50,43,38],
    'Open D':           [62,57,54,50,45,38],
    'DADGAD':           [62,57,55,50,45,38],
  };
  detectPreset(t){
    for(const k in this.PRESETS){ if(this.PRESETS[k].every((v,i)=>v===t[i])) return k; }
    return 'Custom';
  }
  setPreset(name){ if(name==='Custom' || !this.PRESETS[name]) return; this.setState({tuning:this.PRESETS[name].slice()}); }
  bumpString(i, d){
    this.setState(st=>{ const t=st.tuning.slice(); t[i]=Math.max(31,Math.min(72,t[i]+d)); return {tuning:t}; });
  }

  NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  SCALES = {
    'Major':[0,2,4,5,7,9,11],
    'Natural Minor':[0,2,3,5,7,8,10],
    'Dorian':[0,2,3,5,7,9,10],
    'Mixolydian':[0,2,4,5,7,9,10],
    'Lydian':[0,2,4,6,7,9,11],
    'Major Pentatonic':[0,2,4,7,9],
    'Minor Pentatonic':[0,3,5,7,10],
    'Blues':[0,3,5,6,7,10],
  };
  DEG = {0:'1',1:'\u266d2',2:'2',3:'\u266d3',4:'3',5:'4',6:'\u266d5',7:'5',8:'\u266d6',9:'6',10:'\u266d7',11:'7'};
  STRINGS = [
    {name:'e', midi:64, w:1.3},
    {name:'B', midi:59, w:1.6},
    {name:'G', midi:55, w:2.0},
    {name:'D', midi:50, w:2.5},
    {name:'A', midi:45, w:3.1},
    {name:'E', midi:40, w:3.7},
  ];

  ensureAudio(){
    if(!this.ac){ try{ this.ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(this.ac && this.ac.state === 'suspended'){ this.ac.resume(); }
    return this.ac;
  }
  play(midi){
    if(!this.state.sound) return;
    const ac = this.ensureAudio(); if(!ac) return;
    const f = 440 * Math.pow(2,(midi-69)/12);
    const t = ac.currentTime;
    const o = ac.createOscillator(); const o2 = ac.createOscillator();
    o.type='triangle'; o.frequency.value=f;
    o2.type='sine'; o2.frequency.value=f*2;
    const g = ac.createGain(); const g2 = ac.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.42,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.15);
    g2.gain.value = 0.12;
    o.connect(g); o2.connect(g2); g2.connect(g); g.connect(ac.destination);
    o.start(t); o2.start(t); o.stop(t+1.2); o2.stop(t+1.2);
  }

  pillStyle(active){
    return Object.assign({
      padding:'7px 10px', borderRadius:'9px', font:"600 12.5px 'JetBrains Mono',monospace",
      cursor:'pointer', letterSpacing:'0.03em', lineHeight:1, transition:'all .12s ease', outline:'none', whiteSpace:'nowrap'
    }, active ? {
      background:'rgba(52,211,153,0.13)', border:'1px solid rgba(52,211,153,0.5)', color:'#7ff0c4', boxShadow:'0 0 16px rgba(52,211,153,0.12)'
    } : {
      background:'#141a24', border:'1px solid #28313f', color:'#a7afbd'
    });
  }
  segStyle(active){
    return Object.assign({
      padding:'8px 15px', borderRadius:'8px', font:"600 12px 'JetBrains Mono',monospace",
      cursor:'pointer', border:'none', letterSpacing:'0.03em', transition:'all .12s ease', whiteSpace:'nowrap'
    }, active ? {
      background:'rgba(52,211,153,0.16)', color:'#7ff0c4'
    } : {
      background:'transparent', color:'#7b8492'
    });
  }
  dotStyle(isRoot){
    return Object.assign({
      width:'39px', height:'39px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
      font:"700 14px 'JetBrains Mono',monospace", cursor:'pointer', userSelect:'none', transition:'transform .1s ease'
    }, isRoot ? {
      background:'radial-gradient(circle at 36% 30%,#7df0c0 0%,#2fd396 46%,#11b07f 100%)', color:'#04150d',
      border:'1px solid rgba(140,255,210,0.6)', boxShadow:'0 0 0 4px rgba(52,211,153,0.15),0 5px 12px rgba(0,0,0,0.5)'
    } : {
      background:'radial-gradient(circle at 36% 30%,#2b3545 0%,#19212e 72%)', color:'#e2e7f0',
      border:'1px solid #3b4759', boxShadow:'0 4px 10px rgba(0,0,0,0.5)'
    });
  }

  mats(){
    return {
      'Walnut':  {board:'linear-gradient(180deg,#3b2d21 0%,#2d2118 52%,#221811 100%)', fret:'rgba(222,228,240,0.14)', nut:'#e4dabf', str:'#b3b9c6', grain:'rgba(0,0,0,0.16)', inlay:'rgba(232,237,247,0.20)'},
      'Graphite':{board:'linear-gradient(180deg,#2b313a 0%,#1e242d 52%,#161b22 100%)', fret:'rgba(222,228,240,0.16)', nut:'#d2d8e2', str:'#c1c7d4', grain:'rgba(0,0,0,0.20)', inlay:'rgba(232,237,247,0.20)'},
      'Maple':   {board:'linear-gradient(180deg,#d8c39c 0%,#c7ac7c 52%,#b69a6c 100%)', fret:'rgba(60,45,22,0.30)', nut:'#7a6840', str:'#6c7280', grain:'rgba(120,90,40,0.12)', inlay:'rgba(70,55,25,0.45)'},
    };
  }

  renderVals(){
    const N = this.NOTES;
    const root = this.state.root;
    const scaleKey = this.state.scale;
    const intervals = this.SCALES[scaleKey] || this.SCALES['Major'];
    const mode = this.state.mode;
    const lefty = this.props.lefty ?? false;
    const material = this.state.material ?? this.props.material ?? 'Walnut';
    const fretCount = Math.max(7, Math.min(24, Math.round(this.props.fretCount ?? 12)));
    const mat = this.mats()[material] || this.mats()['Walnut'];

    const pcSet = {}; const degByPc = {};
    intervals.forEach(iv => { const pc=(root+iv)%12; pcSet[pc]=true; degByPc[pc]=this.DEG[iv]; });

    const rootList = N.map((n,i)=>({ name:n, style:this.pillStyle(i===root), onClick:()=>this.setState({root:i}) }));
    const scaleList = Object.keys(this.SCALES).map(k=>({ name:k, style:this.pillStyle(k===scaleKey), onClick:()=>this.setState({scale:k}) }));

    const stepMap = {1:'H',2:'W',3:'1\u00bd',4:'2'};
    const chips = intervals.map((iv,idx)=>{
      const pc=(root+iv)%12;
      const last = idx===intervals.length-1;
      const gap = (last ? 12 : intervals[idx+1]) - iv;
      return {
        note:N[pc], degree:this.DEG[iv], hasStep: !last, step: stepMap[gap]||(gap+''),
        pillStyle:{ minWidth:'40px', padding:'8px 7px', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center',
          font:"700 14px 'JetBrains Mono',monospace", background: iv===0?'rgba(52,211,153,0.14)':'#161d28',
          border:'1px solid '+(iv===0?'rgba(52,211,153,0.55)':'#2a3342'), color: iv===0?'#7ff0c4':'#dfe4ec' },
        degStyle:{ font:"600 11px 'JetBrains Mono',monospace", color: iv===0?'#52d6a0':'#7b8492', marginBottom:'5px', letterSpacing:'0.05em' },
      };
    });

    const flexDir = lefty ? 'row-reverse' : 'row';
    const tuning = this.state.tuning;
    const strings = this.STRINGS.map((s,si)=>{
      const midiOpen = tuning[si];
      const openPc = ((midiOpen%12)+12)%12;
      const cells = [];
      for(let f=0; f<=fretCount; f++){
        const pc=(openPc+f)%12;
        const present = !!pcSet[pc];
        const isRoot = pc===root;
        const cell = { flex:'1 1 0', height:'54px', display:'flex', alignItems:'center', justifyContent:'center', position:'relative', zIndex:2 };
        if(f===fretCount){ cell.borderRight='none'; }
        else if(f===0){ cell.borderRight='3px solid '+mat.nut; }
        else { cell.borderRight='1px solid '+mat.fret; }
        cells.push({
          present, label: present ? (mode==='deg'? degByPc[pc] : N[pc]) : '',
          cellStyle: cell, dotStyle: this.dotStyle(isRoot),
          onClick: present ? (()=>this.play(midiOpen+f)) : (()=>{}),
        });
      }
      return {
        name:N[openPc],
        rowStyle:{ position:'relative', display:'flex', flexDirection:flexDir, height:'54px' },
        lineStyle:{ position:'absolute', top:'50%', left:0, right:0, height:s.w+'px', transform:'translateY(-50%)',
          background:mat.str, borderRadius:'2px', zIndex:1, boxShadow:'0 1px 1px rgba(0,0,0,0.55)' },
        cells,
      };
    });

    const markers = {3:1,5:1,7:1,9:1,15:1,17:1,19:1,21:1};
    const fretCells = [];
    for(let f=0; f<=fretCount; f++){
      fretCells.push({
        num:f, marker: !!markers[f], dbl: f>0 && f%12===0,
        numStyle:{ flex:'1 1 0', textAlign:'center', font:"500 11px 'JetBrains Mono',monospace",
          color:(markers[f]||(f>0&&f%12===0))?'#5d6a7d':'#465062', letterSpacing:'0.02em' },
      });
    }

    const preset = this.detectPreset(tuning);
    const stepBtn = { width:'26px', height:'20px', display:'flex', alignItems:'center', justifyContent:'center',
      background:'#141a24', border:'1px solid #28313f', color:'#8b93a3', cursor:'pointer', borderRadius:'6px',
      font:'9px sans-serif', lineHeight:1, padding:0 };
    const tuningStrings = this.STRINGS.map((s,i)=>({
      note: N[((tuning[i]%12)+12)%12],
      boxStyle:{ minWidth:'34px', textAlign:'center', padding:'5px 6px', borderRadius:'7px', background:'#0f141d',
        border:'1px solid #242d3b', font:"700 13px 'JetBrains Mono',monospace",
        color: (((tuning[i]%12)+12)%12)===root ? '#7ff0c4' : '#dfe4ec' },
      upStyle: stepBtn, downStyle: stepBtn,
      up: ()=>this.bumpString(i,1), down: ()=>this.bumpString(i,-1),
    }));

    return {
      material,
      tuningLabel: preset,
      tuningSeq: tuning.slice().reverse().map(m=>N[((m%12)+12)%12]).join(' '),
      presetList: Object.keys(this.PRESETS).concat(['Custom']),
      presetValue: preset,
      onPreset: (e)=>this.setPreset(e.target.value),
      tuningStrings,
      materialList: Object.keys(this.mats()),
      onMaterial: (e)=>this.setState({material:e.target.value}),
      selectStyle:{ appearance:'none', WebkitAppearance:'none', padding:'8px 30px 8px 12px', borderRadius:'9px',
        font:"600 12px 'JetBrains Mono',monospace", letterSpacing:'0.03em', color:'#cfd6e2', cursor:'pointer',
        background:"#141a24 url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%237b8492' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>\") no-repeat right 11px center",
        border:'1px solid #28313f', outline:'none' },
      current: N[root]+' '+scaleKey,
      fretRange: '0\u2013'+fretCount+' frets',
      rootList, scaleList, chips, strings, fretCells, flexDir,
      stepStyle:{ font:"600 11px 'JetBrains Mono',monospace", color:'#5a6273', padding:'0 2px', alignSelf:'flex-end', marginBottom:'10px' },
      boardBg:{ position:'absolute', inset:0, background:mat.board, zIndex:0 },
      grain:{ position:'absolute', inset:0, zIndex:0, opacity:0.55, pointerEvents:'none',
        background:'repeating-linear-gradient(180deg, transparent 0 5px, '+mat.grain+' 5px 6px)' },
      inlayOuter:{ position:'absolute', inset:0, zIndex:1, display:'flex', flexDirection:flexDir, pointerEvents:'none' },
      inlayDot:{ width:'11px', height:'11px', borderRadius:'50%', background:mat.inlay,
        boxShadow: material==='Maple'?'none':'0 0 6px rgba(255,255,255,0.06)' },
      degActive:this.segStyle(mode==='deg'),
      noteActive:this.segStyle(mode==='note'),
      setDeg:()=>this.setState({mode:'deg'}),
      setNote:()=>this.setState({mode:'note'}),
      soundLabel: this.state.sound ? 'On' : 'Off',
      soundStyle:{ display:'inline-flex', alignItems:'center', gap:'8px', padding:'8px 13px', borderRadius:'9px', cursor:'pointer',
        font:"600 12px 'JetBrains Mono',monospace", letterSpacing:'0.03em',
        background:this.state.sound?'rgba(52,211,153,0.12)':'#141a24',
        border:'1px solid '+(this.state.sound?'rgba(52,211,153,0.45)':'#28313f'),
        color:this.state.sound?'#7ff0c4':'#8b93a3' },
      soundDotStyle:{ width:'7px', height:'7px', borderRadius:'50%',
        background:this.state.sound?'#34d399':'#4a5161', boxShadow:this.state.sound?'0 0 8px #34d399':'none' },
      toggleSound:()=>this.setState(st=>({sound:!st.sound})),
      legendNote: mode==='deg' ? 'Numbers = scale degree' : 'Letters = note name',
    };
  }
}
</script>
</body>
</html>
